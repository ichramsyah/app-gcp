version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: app-gcp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: app-gcp-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgrespassword@database:5432/appdb?sslmode=disable
      - JWT_SECRET=mysecretkey123
      - PORT=8080
    depends_on:
      - database
    restart: always

  frontend:
    build: ./frontend
    container_name: app-gcp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
